<!--
  CampusCare — Reset password email (6-digit code only, no magic link).

  In Supabase Dashboard:
  Authentication → Email Templates → "Reset Password"

  1. Set Subject (e.g.): Reset your password — CampusCare
  2. Paste the BODY below (inside the template editor) and Save.

  The app uses verifyOtp({ email, token: '<OTP from email>', type: 'recovery' }).
  Hosted Supabase often sends an 8-digit numeric {{ .Token }} (length can vary by project).
  Variable reference: https://supabase.com/docs/guides/auth/auth-email-templates
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your password</title>
  </head>
  <body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.5; color: #0f172a; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 700; margin: 0 0 16px;">Reset your password</h1>
    <p style="margin: 0 0 16px; color: #475569;">
      Use this verification code to continue resetting your password for <strong>{{ .Email }}</strong>:
    </p>
    <p style="margin: 0 0 24px; font-size: 32px; font-weight: 700; letter-spacing: 0.3em; color: #1d4ed8;">
      {{ .Token }}
    </p>
    <p style="margin: 0; font-size: 14px; color: #64748b;">
      If you did not request this, you can ignore this email. This code will expire shortly.
    </p>
    <p style="margin: 24px 0 0; font-size: 12px; color: #94a3b8;">
      {{ .SiteURL }}
    </p>
  </body>
</html>
